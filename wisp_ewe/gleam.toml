name = "wisp_ewe"
version = "1.0.0"
description = "An Ewe adapter for Wisp"
licences = ["Apache-2.0"]

repository = { type = "github", user = "gleam-wisp", repo = "wisp" }
links = [{ title = "Sponsor", href = "https://github.com/sponsors/lpil" }]

[dependencies]
ewe = ">= 4.0.0 and < 5.0.0"
gleam_http = ">= 4.2.0 and < 5.0.0"
